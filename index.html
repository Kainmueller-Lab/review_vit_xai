<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Transformer XAI Methods – Taxonomy Explorer</title>
<style>
  :root {
    --bg: #f7f9fb;
    --surface: #ffffff;
    --border: #dde3ea;
    --text: #1e2530;
    --text-muted: #6c7a8a;
    --accent: #2f6491;
    --selected: #1a5276;
    --selected-bg: #d0e8f5;
    --highlight: #eaf4fb;
    --match-bg: #fffbe6;
    --error-bg: #fff4f4;
    --error-border: #f5c2c7;
    --shadow: 0 2px 10px rgba(0,0,0,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex; align-items: baseline; gap: 14px;
  }
  header h1 { font-size: 1.2rem; font-weight: 600; color: var(--accent); }
  header p  { font-size: 0.83rem; color: var(--text-muted); }

  .main { max-width: 1300px; margin: 0 auto; padding: 24px 24px 60px; }

  .hint {
    font-size: 0.81rem; color: var(--text-muted);
    margin-bottom: 14px; display: flex; align-items: center; gap: 7px;
  }

  /* chips */
  #filter-chips {
    display: flex; flex-wrap: wrap; gap: 7px;
    min-height: 30px; margin-bottom: 18px; align-items: center;
  }
  .chip {
    background: var(--selected-bg); border: 1px solid var(--selected);
    color: var(--selected); border-radius: 999px;
    padding: 3px 11px 3px 9px; font-size: 0.77rem; font-weight: 500;
    display: flex; align-items: center; gap: 5px; cursor: pointer;
  }
  .chip:hover { background: #b8d6ec; }
  #clear-btn {
    background: none; border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 999px; padding: 3px 11px; font-size: 0.77rem; cursor: pointer; display: none;
  }
  #clear-btn:hover { border-color: #999; color: var(--text); }

  /* tree */
  .tree-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow);
    overflow-x: auto; padding: 20px 12px; margin-bottom: 28px;
  }
  .tree-wrap svg { display: block; margin: 0 auto; }

  /* results */
  #results-section { display: none; }
  #results-section.visible { display: block; }
  .results-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;
  }
  .results-header h2 { font-size: 1rem; font-weight: 600; }
  .results-count { font-size: 0.81rem; color: var(--text-muted); }

  .no-match {
    background: var(--error-bg); border: 1px solid var(--error-border);
    border-radius: 8px; padding: 18px 22px; font-size: 0.88rem; color: #721c24;
    display: flex; align-items: center; gap: 9px;
  }

  .table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--shadow); overflow-x: auto;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.80rem; }

  /* group header row */
  thead tr.group-row th {
    background: #1e3a52; color: #fff;
    padding: 7px 8px; text-align: center;
    font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em;
    border-right: 2px solid #2c5278;
    white-space: nowrap;
  }
  thead tr.group-row th:first-child { border-radius: 10px 0 0 0; border-right: none; }
  thead tr.group-row th.no-group { background: #1e3a52; border-right: none; }

  /* column header row */
  thead tr.col-row th {
    background: var(--accent); color: #fff;
    padding: 8px 6px; text-align: center;
    font-weight: 500; font-size: 0.73rem; white-space: nowrap;
    border-right: 1px solid #3a7ab5;
  }
  thead tr.col-row th:first-child,
  thead tr.col-row th:nth-child(2) {
    text-align: left; padding-left: 10px; border-right: 1px solid #3a7ab5;
  }
  /* group dividers in col-row */
  thead tr.col-row th.grp-start { border-left: 2px solid #1e3a52; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--highlight); }
  tbody td { padding: 7px 6px; text-align: center; white-space: nowrap; }
  tbody td:first-child { text-align: left; padding-left: 10px; font-weight: 500; color: var(--accent); }
  tbody td:nth-child(2) { text-align: left; padding-left: 6px; color: var(--text-muted); }
  tbody td.grp-start { border-left: 2px solid #c8d8e8; }

  .check { color: #217a45; font-size: 0.95rem; }
  .dash  { color: #ccc; }
  .td-match { background: var(--match-bg); }
</style>
</head>

    .conn { stroke: #9ab0c0; stroke-width: 1.3px; fill: none; }
    /* node types */
    .nc rect { fill: #b8d0e8; stroke: #4a7a9b; stroke-width: 2px; }
    .np rect { fill: #e2eaf1; stroke: #7a9ab2; stroke-width: 1.4px; }
    .nl rect { fill: #ffffff; stroke: #9ab0c0; stroke-width: 1.4px; }
    .ng rect { fill: #d5ead9; stroke: #6aaa7a; stroke-width: 1.4px; }

    .ng.selected .lbl, .ng.selected .lbl2 { fill: #1a5276 !important; font-weight: 600; }
    /* dimmed */
    .nl.dimmed, .ng.dimmed { opacity: 0.32; }
    /* clickable */

    .nl:hover rect, .ng:hover rect { filter: brightness(0.92); }

const DATA = RAW.filter(r => r['Short Name Identifier'] && r.Year > 2000);

// ─── TAXONOMY (defines column grouping order) ────────────────────────────────
const TAXONOMY = {
  'Scope':                  ['Local', 'Global'],
  'Stage':                  ['Post-hoc', 'Ante-hoc'],
  'Model Compatibility':    ['Model-specific', 'Model-class-specific', 'Model-agnostic'],
  'Class-specificity':      ['Class-specific', 'Class-agnostic'],
  'Explanation Target':     ['Prediction', 'Concept', 'Embedding', 'Patch Interactions'],
  'Result':                 ['Feature Relevance', 'Scalar', 'Examples', 'Graph', 'Text'],
  'Functioning':            ['Activation', 'Attention', 'Perturbations', 'Relevance', 'Gradient'],
  'Architectural Mechanisms': ['Prototype-based', 'Concept-based', 'Weight-Input-Alignment', 'Masking-based', 'Connectivity Constraints']
};

// Flat ordered column list derived from taxonomy
const ALL_COLS = Object.values(TAXONOMY).flat();

// ─── STATE ───────────────────────────────────────────────────────────────────
const selected = new Set();

function toggle(nodeId) {
  const el = document.getElementById('n-' + nodeId);
  if (!el) return;
  if (selected.has(nodeId)) {
    selected.delete(nodeId);
    el.classList.remove('selected');
  } else {
    selected.add(nodeId);
    el.classList.add('selected');
  }
  updateDim();
  renderChips();
  renderResults();
}

function clearAll() {
  selected.forEach(id => {
    const el = document.getElementById('n-' + id);
    if (el) el.classList.remove('selected', 'dimmed');
  });
  selected.clear();
  document.querySelectorAll('.nl,.ng').forEach(el => el.classList.remove('dimmed'));
  renderChips();
  renderResults();
}

function filterData(filterSet) {
  if (filterSet.size === 0) return DATA;
  return DATA.filter(row => [...filterSet].every(id => row[id] === 1));
}

function updateDim() {
  document.querySelectorAll('.nl,.ng').forEach(el => {
    const nodeId = el.id.replace('n-', '');
    if (selected.has(nodeId)) { el.classList.remove('dimmed'); return; }
    const testSet = new Set(selected); testSet.add(nodeId);
    el.classList.toggle('dimmed', filterData(testSet).length === 0);
  });
}

// ─── CHIPS ───────────────────────────────────────────────────────────────────
const DISPLAY_LABEL = id => id === 'Model-class-specific' ? 'Vision-transformer-specific' : id;

function renderChips() {
  const container = document.getElementById('filter-chips');
  container.querySelectorAll('.chip').forEach(c => c.remove());
  const clearBtn = document.getElementById('clear-btn');
  selected.forEach(id => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${DISPLAY_LABEL(id)} <span style="opacity:.6">×</span>`;
    chip.onclick = () => toggle(id);
    container.insertBefore(chip, clearBtn);
  });
  clearBtn.style.display = selected.size > 1 ? 'inline-flex' : 'none';
}

// ─── TABLE with grouped headers ───────────────────────────────────────────────
function renderResults() {
  const section = document.getElementById('results-section');
  const noMatch = document.getElementById('no-match');
  const tableWrap = document.getElementById('table-wrap');
  const countEl  = document.getElementById('results-count');

  if (selected.size === 0) { section.classList.remove('visible'); return; }
  section.classList.add('visible');

  const rows = filterData(selected);
  countEl.textContent = rows.length + ' method' + (rows.length !== 1 ? 's' : '') + ' found';

  if (rows.length === 0) {
    noMatch.style.display = 'flex'; tableWrap.style.display = 'none'; return;
  }
  noMatch.style.display = 'none'; tableWrap.style.display = '';

  // Which data cols are present (have ≥1 positive value in results)?
  const activeCols = ALL_COLS.filter(c => rows.some(r => r[c] === 1));

  // Build group structure for active cols only
  const activeGroups = [];  // [{group, cols: [col, ...]}]
  Object.entries(TAXONOMY).forEach(([group, cols]) => {
    const gc = cols.filter(c => activeCols.includes(c));
    if (gc.length) activeGroups.push({ group, cols: gc });
  });

  const thead = document.querySelector('#results-table thead');
  const tbody = document.querySelector('#results-table tbody');
  thead.innerHTML = ''; tbody.innerHTML = '';

  // ── GROUP HEADER ROW ──
  const groupRow = document.createElement('tr');
  groupRow.className = 'group-row';

  // Empty cells for Method + Year
  const thMethod = document.createElement('th');
  thMethod.className = 'no-group'; thMethod.rowSpan = 1;
  groupRow.appendChild(thMethod);
  const thYear = document.createElement('th');
  thYear.className = 'no-group'; thYear.rowSpan = 1;
  groupRow.appendChild(thYear);

  activeGroups.forEach(({ group, cols }) => {
    const th = document.createElement('th');
    th.colSpan = cols.length;
    th.textContent = group;
    groupRow.appendChild(th);
  });
  thead.appendChild(groupRow);

  // ── COLUMN HEADER ROW ──
  const colRow = document.createElement('tr');
  colRow.className = 'col-row';

  const thM = document.createElement('th'); thM.textContent = 'Method'; colRow.appendChild(thM);
  const thY = document.createElement('th'); thY.textContent = 'Year';   colRow.appendChild(thY);

  let firstInGroup = true;
  activeGroups.forEach(({ cols }, gi) => {
    cols.forEach((col, ci) => {
      const th = document.createElement('th');
      const displayCol = col === 'Model-class-specific' ? 'ViT-specific' : col;
      th.textContent = displayCol;
      if (ci === 0) th.classList.add('grp-start');
      colRow.appendChild(th);
    });
  });
  thead.appendChild(colRow);

  // ── DATA ROWS ──
  rows.slice().sort((a, b) => a.Year - b.Year).forEach(row => {
    const tr = document.createElement('tr');

    const tdN = document.createElement('td'); tdN.textContent = row['Short Name Identifier']; tr.appendChild(tdN);
    const tdY = document.createElement('td'); tdY.textContent = row.Year; tr.appendChild(tdY);

    activeGroups.forEach(({ cols }, gi) => {
      cols.forEach((col, ci) => {
        const td = document.createElement('td');
        if (ci === 0) td.classList.add('grp-start');
        if (selected.has(col)) td.classList.add('td-match');
        td.innerHTML = row[col] === 1 ? '<span class="check">✓</span>' : '<span class="dash">–</span>';
        tr.appendChild(td);
      });
    });
    tbody.appendChild(tr);
  });
}
